# TVCompanyX — Next.js + PostgreSQL + Socket.io
# Запуск: docker compose up -d --build
# Порты (без конфликта со SmartKid):
#   3000 → Next.js фронтенд + API routes
#   4001 → Socket.io сервер
#   5433 → PostgreSQL (host port; внутри контейнеров — стандартный 5432)

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tvcompanyx_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-0112}@db:5432/tvshow
      - JWT_SECRET=${JWT_SECRET:-change_me_on_production}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-}
      - SOCKET_API_URL=http://frontend:3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tv-network

  socket:
    build:
      context: .
      dockerfile: Dockerfile.socket
    container_name: tvcompanyx_socket
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      - SOCKET_PORT=4001
      - SOCKET_API_URL=http://frontend:3000
    depends_on:
      - frontend
    networks:
      - tv-network

  db:
    image: postgres:15-alpine
    container_name: tvcompanyx_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tvshow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-0112}
    volumes:
      - tv_pgdata:/var/lib/postgresql/data
      - ./docs/db/init_full_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tvshow"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5433:5432"
    networks:
      - tv-network

volumes:
  tv_pgdata:

networks:
  tv-network:
    driver: bridge
